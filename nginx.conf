worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings for Production Hardening
    sendfile        on;
    keepalive_timeout  65;

    # Custom Logging to track Correlation ID and Upstream routing
    log_format main '[$time_local] [Client: $remote_addr] [CorrID: $http_x_correlation_id] '
                    '"$request" $status $body_bytes_sent '
                    '[Upstream: $upstream_addr] [ResponseTime: $upstream_response_time s]';

    # Ensure logs directories exist in your Nginx installation to use these
    access_log logs/access.log main;
    error_log logs/error.log warn;

    # Upstream Cluster Definition
    upstream backend_cluster {
        # Default is Round Robin. For Least Connections, uncomment the line below:
        # least_conn;

        server 127.0.0.1:8081 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8082 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:8083 max_fails=3 fail_timeout=10s;

        # Enable HTTP keepalive to backends for better performance
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Basic Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        location / {
            proxy_pass http://backend_cluster;

            # Header Propagation
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Correlation-ID $http_x_correlation_id;

            # HTTP/1.1 is required for keepalive connections to upstreams
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeout Management
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            # Retry & Failover Strategy
            # Automatically retry the next upstream instance on errors or timeouts
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 15s;
        }

        # Nginx-Level Error Handling (When all instances are down)
        error_page 502 503 504 = @service_unavailable;

        location @service_unavailable {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable","message":"Please try again later"}';
        }
    }
}